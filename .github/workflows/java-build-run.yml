name: Java Compile and Run

on:
  workflow_dispatch:
    inputs:
      java_file:
        description: 'Compile対象のJavaファイル名（拡張子なし）'
        required: false
        default: 'HelloWorld'

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Compile Java class
        run: |
          mkdir -p build
          javac -d build src/${{ inputs.java_file }}.java
      
      - name: Create JAR
        run: |
          cd build
          jar cfe ${{ inputs.java_file }}.jar ${{ inputs.java_file }} *.class
      
      - name: Run JAR
        run: java -jar build/${{ inputs.java_file }}.jar
