name: Java Compile and Run

on:
  workflow_dispatch

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Compile Java class
        run: |
          mkdir -p build
          javac -d build src/HelloWorld.java
      
      - name: Create JAR
        run: |
          cd build
          jar cfe HelloWorld.jar HelloWorld *.class
      
      - name: Run JAR
        run: java -jar build/HelloWorld.jar
